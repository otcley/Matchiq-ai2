<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="MatchIQ AI — Elite football predictions powered by statistical modeling and AI tactical analysis."/>
<title>MatchIQ AI · Football Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#070b14;color:#e2e8f0;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0d1117;}
::-webkit-scrollbar-thumb{background:#1e3a4a;border-radius:4px;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes ringFill{from{stroke-dasharray:0 1000;}to{}}
.spin{animation:spin 0.9s linear infinite;display:inline-block;}
.pulse{animation:pulse 1.5s infinite;}
.fadein{animation:fadeIn 0.4s ease;}

/* Nav */
nav{border-bottom:1px solid #1e2a3a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,11,20,0.97);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#4fc3f7,#0284c7);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px #4fc3f744;}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-0.02em;font-family:'Syne',sans-serif;background:linear-gradient(90deg,#e2e8f0,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:8px;color:#4a5568;letter-spacing:0.16em;margin-top:-2px;}
.badge-live{font-size:9px;padding:4px 10px;background:#00e88f12;border:1px solid #00e88f30;border-radius:20px;color:#00e88f;letter-spacing:0.07em;display:flex;align-items:center;gap:5px;}
.badge-demo{font-size:9px;padding:4px 10px;background:#f5c51814;border:1px solid #f5c51833;border-radius:20px;color:#f5c518;letter-spacing:0.07em;}
.dot-live{width:5px;height:5px;border-radius:50%;background:#00e88f;box-shadow:0 0 6px #00e88f;animation:pulse 2s infinite;}

/* Hero */
.hero{text-align:center;padding:70px 20px 60px;}
.hero-tag{font-size:9px;color:#4fc3f7;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:18px;}
.hero-h1{font-size:clamp(30px,6vw,58px);font-weight:800;font-family:'Syne',sans-serif;line-height:1.08;margin-bottom:18px;background:linear-gradient(180deg,#e2e8f0 0%,#4a5568 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:14px;color:#4a5568;max-width:420px;margin:0 auto 48px;line-height:1.7;}
.league-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:620px;margin:0 auto 52px;}
.league-card{padding:18px 22px;background:linear-gradient(135deg,#0d1421,#111827);border:1px solid #1e2a3a;border-radius:14px;cursor:pointer;color:#e2e8f0;transition:all 0.25s;min-width:145px;text-align:center;font-family:inherit;}
.league-card:hover{border-color:#4fc3f766;transform:translateY(-4px);box-shadow:0 12px 32px rgba(79,195,247,0.1);background:linear-gradient(135deg,#0f1e2e,#151f30);}
.league-flag{font-size:26px;margin-bottom:8px;}
.league-name{font-size:13px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:3px;}
.league-country{font-size:10px;color:#4a5568;}
.feature-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.pill{font-size:11px;padding:6px 13px;background:#0d1421;border:1px solid #1e2a3a;border-radius:20px;color:#4a5568;}

/* League view */
.league-view{max-width:940px;margin:0 auto;padding:24px 16px;}
.back-btn{background:#1a1f2e;border:1px solid #1e2a3a;color:#8892a4;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.2s;font-family:inherit;}
.back-btn:hover{border-color:#4fc3f744;color:#4fc3f7;}
.league-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.league-title{font-size:20px;font-weight:800;font-family:'Syne',sans-serif;}
.league-meta{font-size:10px;color:#4a5568;}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#0d1117;padding:4px;border-radius:10px;width:fit-content;}
.tab{padding:8px 22px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;font-family:inherit;}
.tab.active{background:#1a3a4a;color:#4fc3f7;}
.tab.inactive{background:transparent;color:#4a5568;}

/* Search */
.search-input{width:100%;margin-bottom:20px;background:#0d1117;border:1px solid #1e2a3a;border-radius:10px;color:#e2e8f0;padding:12px 16px;font-size:13px;outline:none;transition:border-color 0.2s;font-family:inherit;}
.search-input:focus{border-color:#4fc3f755;}

/* Match grid */
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;}

/* Match card */
.match-card{background:linear-gradient(135deg,#0d1421,#0f1828);border:1px solid #1e2a3a;border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:all 0.25s;}
.match-card:hover{border-color:#4fc3f744;transform:translateY(-2px);box-shadow:0 8px 30px rgba(79,195,247,0.08);}
.match-card-accent{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4fc3f755,transparent);}
.match-date{display:flex;justify-content:space-between;margin-bottom:14px;font-size:10px;color:#4a5568;letter-spacing:0.06em;}
.match-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.team-home{flex:1;}
.team-name{font-size:14px;font-weight:700;color:#e2e8f0;font-family:'Syne',sans-serif;line-height:1.2;}
.team-pos-home{font-size:10px;color:#4fc3f7;margin-top:3px;}
.team-pos-away{font-size:10px;color:#f06292;margin-top:3px;text-align:right;}
.vs-badge{padding:5px 10px;background:#0d1117;border-radius:6px;font-size:10px;color:#4a5568;font-weight:700;margin:0 10px;flex-shrink:0;}
.team-away{flex:1;text-align:right;}
.matchday{font-size:9px;color:#2d3748;letter-spacing:0.08em;text-align:center;margin-bottom:12px;}
.analyze-btn{width:100%;padding:10px;background:linear-gradient(135deg,#1a3a4a,#0f2030);border:1px solid #4fc3f733;border-radius:8px;color:#4fc3f7;font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;}
.analyze-btn:hover{background:linear-gradient(135deg,#1e4a5a,#122535);border-color:#4fc3f766;}
.analyze-btn:disabled{background:#0d1117;border-color:#1a2535;color:#4a5568;cursor:not-allowed;}

/* Spinner */
.spinner{text-align:center;padding:50px 0;}
.spinner-ball{font-size:32px;animation:spin 0.9s linear infinite;}
.spinner-text{color:#4a5568;font-size:13px;margin-top:14px;}

/* Standings */
.standings-table{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;overflow:hidden;}
.standings-header{display:grid;grid-template-columns:36px 1fr 44px 44px 44px 44px 44px 60px;padding:12px 16px;border-bottom:1px solid #1a1f2e;font-size:10px;color:#4a5568;letter-spacing:0.08em;text-transform:uppercase;background:#090e18;}
.standings-row{display:grid;grid-template-columns:36px 1fr 44px 44px 44px 44px 44px 60px;padding:11px 16px;border-bottom:1px solid #090e18;font-size:13px;align-items:center;transition:background 0.15s;cursor:default;}
.standings-row:hover{background:#111827;}
.standings-row.even{background:#0a0f1a;}
.standings-legend{display:flex;gap:20px;padding:12px 16px;border-top:1px solid #1a1f2e;background:#090e18;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#4a5568;}
.legend-dot{width:10px;height:10px;border-radius:2px;}
.tc{text-align:center;}
.tr{text-align:right;}

/* Analysis modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);backdrop-filter:blur(14px);display:flex;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;}
.modal{background:linear-gradient(160deg,#0d1421,#080d18);border:1px solid #1e3a4a;border-radius:20px;width:100%;max-width:740px;padding:32px 28px;position:relative;margin-top:20px;margin-bottom:20px;animation:fadeIn 0.3s ease;}
.modal-rainbow{position:absolute;top:0;left:0;right:0;height:3px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,#4fc3f7,#a78bfa,#f06292,#00e88f);}
.modal-close{position:absolute;top:18px;right:18px;background:#1a1f2e;border:none;color:#8892a4;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:inherit;}
.modal-close:hover{background:#ff475722;color:#ff4757;}
.modal-tag{font-size:9px;color:#4fc3f7;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:6px;}
.modal-title{font-size:clamp(18px,4vw,26px);font-weight:800;color:#e2e8f0;font-family:'Syne',sans-serif;line-height:1.2;margin-bottom:4px;}
.modal-date{font-size:11px;color:#4a5568;margin-bottom:24px;}

/* Rings */
.rings-row{display:flex;justify-content:center;gap:clamp(16px,4vw,40px);margin-bottom:28px;flex-wrap:wrap;}

/* Confidence */
.conf-badge{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;margin-bottom:24px;}
.conf-dot{width:8px;height:8px;border-radius:50%;}
.conf-label{font-size:11px;font-weight:700;letter-spacing:0.1em;}
.conf-bar-wrap{flex:1;height:3px;background:#131b2a;border-radius:2px;overflow:hidden;margin:0 8px;}
.conf-bar{height:100%;border-radius:2px;transition:width 1.2s ease;}
.conf-pct{font-size:14px;font-weight:800;font-family:'Syne',sans-serif;}

/* Stat cards */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:#0a0f1a;border:1px solid #1a2535;border-radius:10px;padding:14px 16px;}
.stat-card-label{font-size:10px;color:#4a5568;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.stat-card-val{font-size:20px;font-weight:800;font-family:'Syne',sans-serif;}
.stat-card-sub{font-size:10px;color:#4a5568;margin-top:2px;}

/* Stat bars */
.stat-section{background:#080d18;border:1px solid #1a2535;border-radius:12px;padding:20px;margin-bottom:20px;}
.stat-section-title{font-size:10px;color:#4a5568;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:18px;}
.stat-bar-row{margin-bottom:14px;}
.stat-bar-labels{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;}
.stat-bar-track{height:5px;border-radius:4px;background:#131b2a;overflow:hidden;display:flex;}
.stat-bar-home{border-radius:4px 0 0 4px;transition:width 1.1s ease;}
.stat-bar-away{flex:1;border-radius:0 4px 4px 0;}

/* Form section */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.form-card{background:#080d18;border-radius:12px;padding:16px;}
.form-team{font-size:12px;font-weight:700;margin-bottom:10px;font-family:'Syne',sans-serif;}
.form-dots{display:flex;gap:4px;margin-bottom:8px;}
.form-dot{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;}
.form-momentum{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.form-arrow{font-size:16px;line-height:1;}
.form-label{font-size:11px;font-weight:600;}
.form-record{display:flex;gap:12px;margin-top:10px;}
.form-w{font-size:10px;color:#00e88f;}
.form-d{font-size:10px;color:#f5c518;}
.form-l{font-size:10px;color:#ff4757;}

/* AI section */
.ai-section{background:linear-gradient(135deg,#0a1a2a,#080e1a);border:1px solid #1e3a4a;border-radius:14px;padding:22px;margin-bottom:20px;}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#4fc3f7;box-shadow:0 0 10px #4fc3f7;}
.ai-title{font-size:10px;color:#4fc3f7;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;}
.ai-loading-label{font-size:10px;color:#4a5568;margin-left:auto;}
.ai-skeleton{height:12px;background:#131b2a;border-radius:6px;margin-bottom:10px;animation:pulse 1.5s infinite;}
.ai-summary{font-size:13px;color:#a0aec0;line-height:1.75;margin-bottom:18px;}
.ai-insights{display:flex;flex-direction:column;gap:8px;}
.ai-insight{display:flex;gap:10px;align-items:flex-start;}
.ai-insight-dot{width:4px;height:4px;border-radius:50%;background:#4fc3f7;margin-top:7px;flex-shrink:0;}
.ai-insight-text{font-size:12px;color:#8892a4;line-height:1.6;}

/* Disclaimer */
.disclaimer{text-align:center;font-size:10px;color:#1e2a3a;line-height:1.6;border-top:1px solid #0d1421;padding-top:16px;}

/* No results */
.empty{text-align:center;padding:50px 0;color:#4a5568;font-size:14px;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <div>
      <div class="logo-name">MatchIQ AI</div>
      <div class="logo-sub">FOOTBALL INTELLIGENCE</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="badge-demo" id="demoTag" style="display:none;">DEMO MODE</div>
    <div class="badge-live"><div class="dot-live"></div>LIVE</div>
  </div>
</nav>

<!-- MAIN -->
<div id="app"></div>

<!-- ANALYSIS MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const FOOTBALL_API_KEY = '';   // Add your football-data.org key here
const ANTHROPIC_KEY    = '';   // Add your Anthropic key here

const LEAGUES = [
  // Top 5
  {id:'PL',  name:'Premier League',        country:'England',     flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', group:'Europe'},
  {id:'PD',  name:'La Liga',               country:'Spain',       flag:'🇪🇸', group:'Europe'},
  {id:'SA',  name:'Serie A',               country:'Italy',       flag:'🇮🇹', group:'Europe'},
  {id:'BL1', name:'Bundesliga',            country:'Germany',     flag:'🇩🇪', group:'Europe'},
  {id:'FL1', name:'Ligue 1',               country:'France',      flag:'🇫🇷', group:'Europe'},
  // More Europe
  {id:'CL',  name:'Champions League',      country:'Europe',      flag:'⭐', group:'Europe'},
  {id:'EL',  name:'Europa League',         country:'Europe',      flag:'🟠', group:'Europe'},
  {id:'ELC', name:'Championship',          country:'England',     flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', group:'Europe'},
  {id:'DED', name:'Eredivisie',            country:'Netherlands', flag:'🇳🇱', group:'Europe'},
  {id:'PPL', name:'Primeira Liga',         country:'Portugal',    flag:'🇵🇹', group:'Europe'},
  // Americas & International
  {id:'BSA', name:'Serie A Brazil',        country:'Brazil',      flag:'🇧🇷', group:'Americas'},
  {id:'WC',  name:'World Cup',             country:'World',       flag:'🌍', group:'International'},
  {id:'EC',  name:'Euro Championship',     country:'Europe',      flag:'🏆', group:'International'},
];

const MOCK_TEAMS = {
  PL:  ['Arsenal','Manchester City','Liverpool','Chelsea','Tottenham','Manchester Utd','Newcastle','Aston Villa','Brighton','West Ham','Brentford','Fulham','Crystal Palace','Wolves','Everton','Nottm Forest','Bournemouth','Luton','Burnley','Sheffield Utd'],
  PD:  ['Real Madrid','Barcelona','Atletico Madrid','Real Sociedad','Athletic Bilbao','Real Betis','Valencia','Villarreal','Sevilla','Osasuna','Girona','Mallorca','Las Palmas','Alaves','Getafe','Celta Vigo','Rayo Vallecano','Cadiz','Granada','Almeria'],
  SA:  ['Inter Milan','AC Milan','Juventus','Napoli','Lazio','Roma','Atalanta','Fiorentina','Bologna','Torino','Monza','Genoa','Sassuolo','Udinese','Lecce','Cagliari','Hellas Verona','Empoli','Frosinone','Salernitana'],
  BL1: ['Bayer Leverkusen','Bayern Munich','Borussia Dortmund','RB Leipzig','Stuttgart','Eintracht Frankfurt','Freiburg','Hoffenheim','Wolfsburg','Werder Bremen','Mainz','Augsburg','Bochum','Union Berlin','Köln','Heidenheim','Darmstadt','Mönchengladbach'],
  FL1: ['PSG','Monaco','Brest','Lille','Nice','Lens','Rennes','Marseille','Lyon','Toulouse','Montpellier','Reims','Nantes','Metz','Strasbourg','Le Havre','Clermont','Lorient'],
  CL:  ['Real Madrid','Manchester City','Bayern Munich','PSG','Arsenal','Barcelona','Inter Milan','Borussia Dortmund','Atletico Madrid','Porto','Napoli','AC Milan','Liverpool','Chelsea','Juventus','RB Leipzig'],
  EL:  ['Bayer Leverkusen','Roma','Liverpool','Juventus','Fiorentina','Ajax','Villarreal','Real Sociedad','Marseille','Eintracht Frankfurt','West Ham','Atalanta','Rangers','Sevilla','Betis','Sporting CP'],
  ELC: ['Leicester','Ipswich','Leeds','Burnley','Sheffield Utd','Middlesbrough','West Brom','Sunderland','Coventry','Hull','Swansea','Millwall','Stoke','Preston','QPR','Watford','Norwich','Bristol City','Blackburn','Cardiff'],
  DED: ['Ajax','PSV','Feyenoord','AZ Alkmaar','Utrecht','Twente','Vitesse','NEC','Heerenveen','Sparta Rotterdam','RKC Waalwijk','Fortuna Sittard','Excelsior','Go Ahead Eagles','PEC Zwolle','SC Cambuur','Groningen','Volendam'],
  PPL: ['Benfica','Porto','Sporting CP','Braga','Vitoria Guimaraes','Casa Pia','Famalicao','Chaves','Boavista','Rio Ave','Estoril','Portimonense','Vizela','Moreirense','Arouca','Pacos Ferreira','Gil Vicente','Santa Clara'],
  BSA: ['Flamengo','Palmeiras','Atletico Mineiro','Gremio','Internacional','Fluminense','Corinthians','Santos','Sao Paulo','Botafogo','Vasco','Fortaleza','Athletico PR','Bahia','Bragantino','Goias','Cuiaba','America MG','Cruzeiro','Coritiba'],
  WC:  ['Brazil','France','Argentina','England','Spain','Germany','Netherlands','Portugal','Belgium','Croatia','Uruguay','Denmark','Mexico','USA','Senegal','Morocco','Switzerland','Japan','South Korea','Australia'],
  EC:  ['France','England','Spain','Germany','Portugal','Netherlands','Belgium','Italy','Croatia','Denmark','Austria','Switzerland','Poland','Czech Republic','Hungary','Ukraine','Turkey','Serbia','Romania','Slovakia'],
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  view: 'home',         // home | league
  activeLeague: null,
  leagueData: null,
  loading: false,
  tab: 'fixtures',
  search: '',
  analyzingId: null,
  analysisResult: null,
  cache: {},
};

// ─── MOCK DATA ────────────────────────────────────────────────────────────────
function buildMock(leagueId) {
  const names = MOCK_TEAMS[leagueId] || MOCK_TEAMS.PL;
  const standings = names.map((name, i) => ({
    position: i+1,
    team: {id:i+1, name, shortName:name.split(' ')[0]},
    points: Math.max(0, 72 - i*3 + Math.floor(Math.random()*5)),
    goalDifference: Math.round(42 - i*4 + Math.random()*8 - 4),
    won:  Math.max(0, 22 - i + Math.floor(Math.random()*3)),
    draw: Math.max(0, 7  - Math.floor(i/4) + Math.floor(Math.random()*3)),
    lost: Math.max(0, i  + Math.floor(Math.random()*3)),
    playedGames: 30,
    goalsFor:     Math.max(10, 60 - i*2 + Math.floor(Math.random()*8)),
    goalsAgainst: Math.max(10, 20 + i*2 + Math.floor(Math.random()*8)),
  }));
  const fixtures = [];
  for (let i = 0; i < standings.length-1; i+=2) {
    fixtures.push({
      id: i*100+leagueId.charCodeAt(0),
      homeTeam: standings[i].team,
      awayTeam: standings[i+1].team,
      utcDate: new Date(Date.now()+(Math.floor(i/2)+1)*86400000).toISOString(),
      status:'SCHEDULED',
      matchday: Math.floor(i/2)+29,
    });
  }
  return {standings, fixtures, isMock:true};
}

// ─── REAL API via Netlify Function (fixes CORS) ───────────────────────────────
async function fetchLeagueData(leagueId) {
  try {
    const res = await fetch(`/.netlify/functions/football?leagueId=${leagueId}`);
    if (!res.ok) throw new Error('Function error');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const standings = (data.standings?.standings?.[0]?.table||[]).map(s=>({
      position:s.position, team:{id:s.team.id,name:s.team.name,shortName:s.team.shortName,crest:s.team.crest},
      points:s.points, goalDifference:s.goalDifference,
      won:s.won, draw:s.draw, lost:s.lost, playedGames:s.playedGames,
      goalsFor:s.goalsFor, goalsAgainst:s.goalsAgainst,
    }));
    if (!standings.length) throw new Error('empty');
    const fixtures = data.fixtures?.matches||[];
    return {standings, fixtures, isMock:false};
  } catch(e) {
    console.warn('API fallback:', e.message);
    await new Promise(r=>setTimeout(r,700));
    return buildMock(leagueId);
  }
}

// ─── PREDICTION ENGINE ────────────────────────────────────────────────────────
function calcPred(homeTeam, awayTeam, standings) {
  const find = id => standings.find(s=>s.team?.id===id)||null;
  const hS=find(homeTeam.id), aS=find(awayTeam.id);
  const total=standings.length||20;
  const hPos=hS?.position||Math.ceil(total/2), aPos=aS?.position||Math.ceil(total/2);
  const hPts=hS?.points||30, aPts=aS?.points||30;
  const hGD=hS?.goalDifference||0, aGD=aS?.goalDifference||0;
  const hGF=hS?.goalsFor||30, aGF=aS?.goalsFor||30;
  const hGA=hS?.goalsAgainst||30, aGA=aS?.goalsAgainst||30;
  const hW=hS?.won||8, aW=aS?.won||8;
  const hD=hS?.draw||6, aD=aS?.draw||6;
  const hL=hS?.lost||8, aL=aS?.lost||8;
  const hP=hS?.playedGames||28, aP=aS?.playedGames||28;
  const maxPts=Math.max(hPts,aPts,1);
  const hPosScore=((total-hPos+1)/total)*35, aPosScore=((total-aPos+1)/total)*35;
  const hPtsScore=(hPts/maxPts)*25, aPtsScore=(aPts/maxPts)*25;
  const hAtk=hP?(hGF/hP):1, aAtk=aP?(aGF/aP):1;
  const maxAtk=Math.max(hAtk,aAtk,0.1);
  const hAtkS=(hAtk/maxAtk)*15, aAtkS=(aAtk/maxAtk)*15;
  const hDefS=Math.max(0,10-(hP?(hGA/hP)*5:5)), aDefS=Math.max(0,10-(aP?(aGA/aP)*5:5));
  const hWR=hP?hW/hP:0.33, aWR=aP?aW/aP:0.33;
  const hTotal=hPosScore+hPtsScore+hAtkS+hDefS+hWR*10+8;
  const aTotal=aPosScore+aPtsScore+aAtkS+aDefS+aWR*10;
  const drawPool=(hTotal+aTotal)*0.28;
  const grand=hTotal+aTotal+drawPool;
  let hw=Math.round((hTotal/grand)*100), aw=Math.round((aTotal/grand)*100);
  hw=Math.max(15,Math.min(72,hw)); aw=Math.max(10,Math.min(65,aw));
  let dr=Math.max(18,Math.min(38,100-hw-aw));
  const sum=hw+dr+aw; hw=Math.round((hw/sum)*100); dr=Math.round((dr/sum)*100); aw=100-hw-dr;
  const gap=Math.abs(hw-aw);
  const conf=gap>22?'HIGH':gap>11?'MODERATE':'LOW';
  const confBase=gap>22?74:gap>11?54:36;
  const confPct=confBase+Math.floor(Math.random()*12);
  const hxG=+((hAtk*0.55+aDefS*0.05)*1.1).toFixed(2);
  const axG=+((aAtk*0.55+hDefS*0.05)*0.95).toFixed(2);
  const totalxG=hxG+axG;
  const over25=Math.round(Math.min(88,Math.max(18,(totalxG/3.0)*100)));
  const btts=Math.round(Math.min(82,Math.max(18,(Math.min(hxG,axG)/1.3)*100)));
  const upset=Math.round(Math.min(60,Math.max(5,(1-gap/60)*50)));
  const buildForm=(w,d,l,p)=>{
    if(!p)return['?','?','?','?','?'];
    const wr=w/p,dr2=d/p;
    return Array.from({length:5},()=>{const r=Math.random();return r<wr?'W':r<wr+dr2?'D':'L';});
  };
  return {homeWin:hw,draw:dr,awayWin:aw,confidence:conf,confPct,likelyScore:`${Math.round(hxG)}-${Math.round(axG)}`,over25,btts,upset,hxG,axG,hPos,aPos,hPts,aPts,hGD,aGD,hGF,aGF,hGA,aGA,hW,aW,hD,aD,hL,aL,hP,aP,hForm:buildForm(hW,hD,hL,hP),aForm:buildForm(aW,aD,aL,aP)};
}

// ─── AI SUMMARY ───────────────────────────────────────────────────────────────
async function getAISummary(home, away, pred, league) {
  if (!ANTHROPIC_KEY) return buildFallback(home, away, pred);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:450,
        messages:[{role:'user',content:`You are a senior football analyst for MatchIQ AI. Write a 3-sentence tactical preview for ${home} vs ${away} in the ${league}. Stats: ${home} #${pred.hPos} pos, ${pred.hPts}pts, GD${pred.hGD>0?'+':''}${pred.hGD}, ${pred.hGF}gf/${pred.hGA}ga. ${away} #${pred.aPos} pos, ${pred.aPts}pts, GD${pred.aGD>0?'+':''}${pred.aGD}. Win%: ${home} ${pred.homeWin}% | Draw ${pred.draw}% | ${away} ${pred.awayWin}%. xG: ${pred.hxG} vs ${pred.axG}. Be like Opta/WhoScored. No fluff. Respond ONLY valid JSON no markdown: {"summary":"...","insight1":"...","insight2":"...","insight3":"..."}`}],
      }),
    });
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'';
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) { return buildFallback(home, away, pred); }
}

function buildFallback(home, away, pred) {
  const hEdge=pred.homeWin>pred.awayWin;
  const dom=hEdge?home:away, domW=hEdge?pred.homeWin:pred.awayWin;
  const gap=Math.abs(pred.homeWin-pred.awayWin);
  return {
    summary:`${dom}'s ${hEdge?'home advantage and superior':'stronger away'} league position gives them a statistical edge at ${domW}% win probability. With an xG model projecting ${pred.hxG} vs ${pred.axG}, ${pred.over25>60?'this looks like a goals-heavy fixture':'expect a tight tactical affair'}. ${gap<15?'The narrow gap makes this genuinely competitive — draw is a real possibility.':'The probability gap is clear enough to lean toward the favourite.'}`,
    insight1:`xG model: ${home} ${pred.hxG} vs ${away} ${pred.axG} — ${pred.over25>60?'goals expected':'low-scoring likely'}`,
    insight2:`BTTS probability at ${pred.btts}% — ${pred.btts>55?'both attacks capable of scoring':'defensive solidity likely dominant'}`,
    insight3:`Upset potential: ${pred.upset}% — ${pred.upset>40?'underdog has real chance here':'favourite should control proceedings'}`,
  };
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function ring(pct, label, color, size=100) {
  const r=(size-14)/2, circ=2*Math.PI*r, dash=(pct/100)*circ;
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <svg width="${size}" height="${size}" style="filter:drop-shadow(0 0 10px ${color}44)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#131b2a" stroke-width="7"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})"/>
      <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        fill="${color}" font-size="17" font-weight="800" font-family="'Syne',sans-serif">${pct}%</text>
    </svg>
    <span style="font-size:10px;color:#8892a4;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;text-align:center;max-width:80px;">${label}</span>
  </div>`;
}

function confBadge(level, pct) {
  const map={HIGH:{c:'#00e88f',l:'HIGH CONFIDENCE'},MODERATE:{c:'#f5c518',l:'MODERATE'},LOW:{c:'#ff4757',l:'LOW CONFIDENCE'}};
  const m=map[level]||map.LOW;
  return `<div class="conf-badge" style="background:${m.c}14;border:1px solid ${m.c}30;">
    <div class="conf-dot" style="background:${m.c};box-shadow:0 0 10px ${m.c};"></div>
    <span class="conf-label" style="color:${m.c};">${m.l}</span>
    <div class="conf-bar-wrap"><div class="conf-bar" style="width:${pct}%;background:linear-gradient(90deg,${m.c}88,${m.c});"></div></div>
    <span class="conf-pct" style="color:${m.c};">${pct}%</span>
  </div>`;
}

function statBar(label, hv, av, hc='#4fc3f7', ac='#f06292', fmt) {
  const total=(hv+av)||1, hp=Math.round((hv/total)*100);
  const f=fmt||(v=>v);
  return `<div class="stat-bar-row">
    <div class="stat-bar-labels">
      <span style="color:${hc};font-weight:700;">${f(hv)}</span>
      <span style="color:#4a5568;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;">${label}</span>
      <span style="color:${ac};font-weight:700;">${f(av)}</span>
    </div>
    <div class="stat-bar-track">
      <div class="stat-bar-home" style="width:${hp}%;background:linear-gradient(90deg,${hc},${hc}99);"></div>
      <div class="stat-bar-away" style="background:linear-gradient(90deg,${ac}99,${ac});"></div>
    </div>
  </div>`;
}

function formDots(results) {
  const cm={W:'#00e88f',D:'#f5c518',L:'#ff4757','?':'#2d3748'};
  return results.map(r=>`<div class="form-dot" style="background:${cm[r]||'#2d3748'};box-shadow:0 0 6px ${cm[r]||'#2d3748'}44;" title="${r==='W'?'Win':r==='D'?'Draw':'Loss'}">${r}</div>`).join('');
}

function formMomentum(w,d,l,p) {
  if(!p)return '';
  const score=((w+d*0.4)/p)*100;
  const arrow=score>62?'↑':score>42?'→':'↓';
  const label=score>62?'Strong Momentum':score>42?'Decent Form':'Inconsistent';
  const color=score>62?'#00e88f':score>42?'#f5c518':'#ff4757';
  return `<div class="form-momentum"><span class="form-arrow" style="color:${color};">${arrow}</span><span class="form-label" style="color:${color};">${label}</span></div>`;
}

  state.analysisResult=null;

  if (state.cache[id]) {
    state.leagueData=state.cache[id];
    render();
    return;
  }
  state.loading=true;
  state.leagueData=null;
  render();
  const data=await fetchLeagueData(id);
  state.cache[id]=data;
  state.leagueData=data;
  state.loading=false;
  render();
}

function goHome() {
  state.view='home';
  state.activeLeague=null;
  state.leagueData=null;
  state.analysisResult=null;
  document.getElementById('demoTag').style.display='none';
  render();
}

function setTab(tab) { state.tab=tab; render(); }
function setSearch(v) { state.search=v; render(); }

async function analyzeMatch(fixtureId) {
  if (!state.leagueData) return;
  const fixture=state.leagueData.fixtures.find(f=>f.id===fixtureId);
  if (!fixture) return;
  state.analyzingId=fixtureId;
  render();
  const pred=calcPred(fixture.homeTeam, fixture.awayTeam, state.leagueData.standings);
  state.analysisResult={fixture, pred, ai:null, aiLoading:true};
  state.analyzingId=null;
  renderModal_();
  document.getElementById('modalOverlay').style.display='flex';
  render();
  const ai=await getAISummary(fixture.homeTeam.name, fixture.awayTeam.name, pred, state.activeLeague.name);
  if (state.analysisResult) { state.analysisResult.ai=ai; state.analysisResult.aiLoading=false; }
  renderModal_();
}

function closeModal() {
  state.analysisResult=null;
  document.getElementById('modalOverlay').style.display='none';
}

function handleOverlayClick(e) { if(e.target===e.currentTarget) closeModal(); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML=state.view==='home'?renderHome():renderLeague();
}

function renderModal_() {
  document.getElementById('modalContent').innerHTML=renderModal();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
